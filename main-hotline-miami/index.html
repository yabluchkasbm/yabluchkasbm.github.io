<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="animate.css">
    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Press+Start+2P&family=Rubik+Mono+One&family=Rubik+Wet+Paint&family=Ruslan+Display&display=swap"
        rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="code/HotlineMiami.png">




    <style>
        a {
            cursor: url(cursor.png), pointer;
            text-decoration: none;
            color: white;
            pointer-events: auto;
            /* cursor: pointer; */

        }

        .base-image {
            position: absolute;
            object-fit: cover;
            display: block;
            transform: scale(1.1);
            
            

        }

        .glitch-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('1-4.jpg') no-repeat center/cover;
            pointer-events: none;
            position: absolute;
            background: linear-gradient(45deg,
                    #ff0055,
                    #00ff66,
                    #7a00ff,
                    #00ffff,
                    #ffaa00);
            background-size: 300% 300%;
            animation: color 6s ease-in-out infinite;
            opacity: 0.5;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 2;
        }

        body {

            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;


        }

        .screen-container {
            position: relative;
            overflow: hidden;


        }



        html {

            padding: 0;
            font-family: "Press Start 2P", system-ui;
            color: #eee;
            font-size: 1em;
            line-height: 1;
            text-shadow: 0.06rem 0 0.06rem #ea36af, -0.125rem 0 0.06rem #75fa69;
            letter-spacing: 0.125em;
            animation-duration: 0.01s;
            animation-name: textflicker;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }




        @keyframes textflicker {
            0% {
                transform: translateX(-50%) translateY(10px) rotate(-1.5deg) skewX(-3deg);
            }

            50% {
                transform: translateX(-50%) translateY(-10px) rotate(1.5deg) skewX(3deg);
            }

            100% {
                transform: translateX(-50%) translateY(10px) rotate(-1.5deg) skewX(-3deg);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .content-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            animation: crt-flicker 0.15s infinite, wave-float 6s ease-in-out infinite;
        }



        .glitch-layer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            mix-blend-mode: screen;
            opacity: 0.7;
            transform: translateX(-3px);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }


        .glitch-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            mix-blend-mode: screen;
            opacity: 0.7;
            transform: translateX(3px);
            animation: glitch-anim-2 1.5s infinite linear alternate-reverse;
        }





        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }


        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, #8d1352a7 100%);
            z-index: 11;
            pointer-events: none;
        }


        @keyframes crt-flicker {
            0% {
                opacity: 0.99;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.98;
            }
        }


        @keyframes wave-float {
            0% {
                transform: translateY(0) rotate(-0.25deg);
            }

            50% {
                transform: translateY(4px) rotate(0.25deg);
            }

            100% {
                transform: translateY(0) rotate(-0.25deg);
            }
        }


        @keyframes vhs-move {
            0% {
                top: -5%;
            }

            40% {
                top: 105%;
            }

            41% {
                top: -5%;
            }

            70% {
                top: 45%;
            }

            /* затримка посередині для стилю */
            73% {
                top: 48%;
            }

            100% {
                top: 105%;
            }
        }


        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(40% 0 61% 0);
                transform: skew(-3deg);
            }

            5% {
                clip-path: inset(92% 0 1% 0);
                transform: skew(5deg);
            }

            10% {
                clip-path: inset(15% 0 80% 0);
                transform: skew(-1deg);
            }

            15% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }

            70% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }

            73% {
                clip-path: inset(70% 0 15% 0);
                transform: translateX(-10px) cubic-bezier(.46, .03, .52, .96);
            }

            77% {
                clip-path: inset(2% 0 85% 0);
                transform: translateX(5px);
            }

            80% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }

            100% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(25% 0 58% 0);
                transform: translateX(4px);
            }

            6% {
                clip-path: inset(80% 0 5% 0);
                transform: translateX(-6px) translateY(-2px);
            }

            11% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }

            45% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }

            48% {
                clip-path: inset(50% 0 45% 0);
                transform: skew(8deg);
            }

            50% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }

            100% {
                clip-path: inset(0% 0 0% 0);
                transform: skew(0deg);
            }
        }


        @keyframes color {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .screen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            perspective: 1200px;
        }

        .base-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            cursor: url(cursor.png), pointer;
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 2rem;
            line-height: 1.4;
            text-align: center;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0.08rem 0 0.08rem #ea36af, -0.15rem 0 0.08rem #75fa69;
            animation: textflicker 0.01s infinite, text-pulse 0.8s ease-in-out infinite;
        }
    </style>
    <title>Hotline Miami Fan-Site</title>

</head>

<body>
    <div class="screen-container">
        <div class="content-wrapper">
            <img src="1-4.jpg" class="base-image">
            <div class="glitch-layer"></div>
            <div class="vhs-distortion-bar"></div>
        </div>
        <h1> <a href="index-1.html"> Press here to Start</a></h1>
        <div class="scanlines"></div>
        <div class="vignette"></div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>




    <script src="1.js"></script>
    <hr>
    <style>
        @keyframes textflicker {
            from {
                text-shadow: 1px 0 0 #ea36af, -2px 0 0 #75fa69;
            }

            to {
                text-shadow: 2px 0.5px 2px #ea36af, -1px -0.5px 2px #75fa69;
            }
        }

        @keyframes pulse-float {
            0% {
                transform: translateY(0) scale(1) rotate(-0.25deg);
            }

            15% {
                transform: translateY(-2px) scale(1.002) rotate(0.1deg);
            }

            20% {
                transform: translateY(1px) scale(1.0) rotate(0.25deg);
            }

            30% {
                transform: translateY(-3px) scale(1.003) rotate(-0.15deg);
            }

            45% {
                transform: translateY(0) scale(1.0) rotate(0.1deg);
            }

            50% {
                transform: translateY(4px) scale(1.005) rotate(0.3deg);
            }

            65% {
                transform: translateY(1px) scale(1.001) rotate(-0.1deg);
            }

            70% {
                transform: translateY(-2px) scale(1.003) rotate(-0.25deg);
            }

            85% {
                transform: translateY(0) scale(1.0) rotate(0.15deg);
            }

            100% {
                transform: translateY(0) scale(1) rotate(-0.25deg);
            }
        }

        @keyframes text-pulse {
            0% {
                transform: translateX(-50%) scale(1.0);
                text-shadow: 0.08rem 0 0.08rem #ea36af, -0.15rem 0 0.08rem #75fa69;
            }

            10% {
                transform: translateX(-50%) scale(1.08) translateY(-1px);
                text-shadow: 3px 0 3px #ea36af, -5px 0 3px #75fa69;
            }

            15% {
                transform: translateX(-50%) scale(1.02);
                text-shadow: 1.5px 0 1.5px #ea36af, -3px 0 1.5px #75fa69;
            }

            40% {
                transform: translateX(-50%) scale(1.0);
            }

            60% {
                transform: translateX(-50%) scale(1.0);
            }

            70% {
                transform: translateX(-50%) scale(1.05) translateY(-1px);
                text-shadow: 3px 0 3px #ea36af, -5px 0 3px #75fa69;
            }

            75% {
                transform: translateX(-50%) scale(1.02);
            }

            100% {
                transform: translateX(-50%) scale(1.0);
                text-shadow: 0.08rem 0 0.08rem #ea36af, -0.15rem 0 0.08rem #75fa69;
            }
        }
    </style>



</body>

</html>
